<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Aliva Saúde — Gestão Clínica</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#2a7a9b"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
  <style>
    :root { --aliva-escuro: #2a7a9b; --aliva-claro: #3dbcba; --fundo: #eaf6f6; --branco: #ffffff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); padding: 10px; color: #333; }
    header { text-align: center; padding: 10px 0; }
    .logo { max-width: 160px; height: auto; }
    .nav-tabs { display: flex; gap: 5px; max-width: 800px; margin: 0 auto 15px auto; }
    .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: white; color: var(--aliva-escuro); font-weight: bold; cursor: pointer; }
    .tab-btn.active { background: var(--aliva-escuro); color: white; }
    .card { background: white; border-radius: 16px; padding: 20px; max-width: 800px; margin: 0 auto 20px auto; box-shadow: 0 8px 20px rgba(42,122,155,0.08); position: relative; }
    .section-title { font-size: 0.85rem; color: var(--aliva-claro); text-transform: uppercase; margin: 20px 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; font-weight: bold; }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--aliva-escuro); font-size: 0.95rem; }
    input, textarea { width: 100%; padding: 12px; border: 1.5px solid #d1e8e7; border-radius: 10px; font-size: 1rem; outline: none; }
    .radio-group { display: flex; gap: 10px; }
    .radio-group input { display: none; }
    .radio-group label { flex: 1; background: #fff; border: 1.5px solid #d1e8e7; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; color: #777; }
    .radio-group input:checked + label { background: var(--aliva-claro); border-color: var(--aliva-claro); color: white; }
    .conditional-field { display: none; margin-top: 10px; }
    #preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .thumb { width: 70px; height: 90px; object-fit: cover; border-radius: 8px; border: 2px solid var(--aliva-claro); cursor: pointer; }
    .arquivo-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .badge-pending { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
    #scanner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; z-index: 10000; }
    #scanner-ui-cont { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; touch-action: none; }
    .scanner-btns { display: flex; padding: 20px; gap: 10px; background: #1a1a1a; }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    .btn-primary { background: var(--aliva-claro); color: white; }
    .btn-save { background: var(--aliva-claro); color: white; margin-top: 20px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header><img src="Hlogo.png" alt="Aliva Saúde" class="logo" id="mainLogo"></header>

<div class="nav-tabs">
  <button id="tab-novo" class="tab-btn active" onclick="switchTab('aba-novo')">Ficha Clínica</button>
  <button id="tab-arquivo" class="tab-btn" onclick="switchTab('aba-arquivo')">Arquivo Digital</button>
</div>

<div id="aba-novo" class="aba-conteudo active">
  <div class="card">
    <div id="edit-indicator" class="badge-pending hidden" style="margin-bottom:15px; text-align:center; display:block;">✏️ A EDITAR REGISTO</div>
    <div class="section-title">Dados do Paciente</div>
    <div class="input-group"><label>Nome Completo</label><input type="text" id="nome"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="input-group"><label>Nascimento</label><input type="date" id="dataNasc"></div>
        <div class="input-group"><label>ID / Processo</label><input type="text" id="idPaciente"></div>
    </div>
    <div class="input-group"><label>Exame Solicitado</label><input type="text" id="exame"></div>
    
    <div class="section-title">Questionário Clínico</div>
    <div class="input-group"><label>Hipótese Diagnóstica</label><textarea id="hipotese" rows="2"></textarea></div>

    <div class="input-group">
      <label>Cirurgia Prévia?</label>
      <div class="radio-group">
        <input type="radio" name="cirurgia" id="cn" value="Não" checked onclick="toggleC('gc', false)"><label for="cn">Não</label>
        <input type="radio" name="cirurgia" id="cs" value="Sim" onclick="toggleC('gc', true)"><label for="cs">Sim</label>
      </div>
      <div id="gc" class="conditional-field"><input type="text" id="cir_det" placeholder="Qual cirurgia e quando?"></div>
    </div>

    <div class="input-group">
      <label>Quimio ou Radioterapia?</label>
      <div class="radio-group">
        <input type="radio" name="quimio" id="qn" value="Não" checked onclick="toggleC('gq', false)"><label for="qn">Não</label>
        <input type="radio" name="quimio" id="qs" value="Sim" onclick="toggleC('gq', true)"><label for="qs">Sim</label>
      </div>
      <div id="gq" class="conditional-field"><input type="text" id="q_det" placeholder="Quantas sessões/ciclos?"></div>
    </div>

    <div class="input-group">
      <label>Trauma Local?</label>
      <div class="radio-group">
        <input type="radio" name="trauma" id="tn" value="Não" checked onclick="toggleC('gt', false)"><label for="tn">Não</label>
        <input type="radio" name="trauma" id="ts" value="Sim" onclick="toggleC('gt', true)"><label for="ts">Sim</label>
      </div>
      <div id="gt" class="conditional-field"><input type="text" id="t_det" placeholder="Descreva o trauma"></div>
    </div>

    <div class="input-group"><label>Febre ou Outros Sintomas?</label><input type="text" id="sintomas"></div>
    <div class="input-group"><label>Início dos Sintomas (Tempo)</label><input type="text" id="inicio"></div>

    <div class="section-title">Anexos</div>
    <input type="file" id="camInput" accept="image/*" capture="environment">
    <div id="preview-container"></div>

    <button class="btn btn-save" id="btnSubmit" onclick="prepararEnvio()">Finalizar e Arquivar</button>
  </div>
</div>

<div id="aba-arquivo" class="aba-conteudo">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2>Arquivo</h2>
        <button onclick="carregarLista()" style="background:none; border:none; color:var(--aliva-claro); font-size:1.2rem;">🔄 Atualizar</button>
    </div>
    <div id="lista-arquivos">A carregar...</div>
  </div>
</div>

<div id="scanner-overlay">
    <div id="scanner-ui-cont"><canvas id="canvas-ui"></canvas></div>
    <div class="scanner-btns">
        <button class="btn" style="background:#444; color:white;" onclick="fecharScanner()">Sair</button>
        <button class="btn btn-primary" onclick="processarScan()">Aplicar Realce</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyg3ZXQLgUGkGPI4-7TiWtaAb1bMD95j_M3WSuhQQoG5DYvdOFmII5Ztf85Nf_Rqpo/exec";
    let anexos = [], pontos = [], imgTemp = null, escalaVisual = 1, dbOnline = [], rascunhoAtivo = null;

    // Inicialização e Auto-Save
    window.onload = () => { carregarLista(); setInterval(syncFila, 10000); };

    function toggleC(id, s) { document.getElementById(id).style.display = s ? 'block' : 'none'; }
    
    function switchTab(id) {
        document.querySelectorAll('.aba-conteudo, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'aba-arquivo') carregarLista();
    }

    // Lógica do Scanner
    document.getElementById('camInput').addEventListener('change', function(e) {
        if(!e.target.files[0]) return;
        const r = new FileReader();
        r.onload = ev => { const i = new Image(); i.onload = () => abrirScanner(i); i.src = ev.target.result; };
        r.readAsDataURL(e.target.files[0]);
    });

    function abrirScanner(img) {
        imgTemp = img; document.getElementById('scanner-overlay').style.display = 'flex';
        const canvas = document.getElementById('canvas-ui');
        const maxW = window.innerWidth * 0.95, maxH = window.innerHeight * 0.75;
        escalaVisual = Math.min(maxW / img.width, maxH / img.height);
        canvas.width = img.width * escalaVisual; canvas.height = img.height * escalaVisual;
        const w = canvas.width, h = canvas.height;
        pontos = [{x:w*0.05,y:h*0.05},{x:w*0.95,y:h*0.05},{x:w*0.95,y:h*0.95},{x:w*0.05,y:h*0.95}];
        desenharUI(); configurarTouch(canvas);
    }

    function desenharUI() {
        const ctx = document.getElementById('canvas-ui').getContext('2d');
        ctx.drawImage(imgTemp, 0, 0, ctx.canvas.width, ctx.canvas.height);
        ctx.strokeStyle = "#3dbcba"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(pontos[0].x, pontos[0].y);
        pontos.forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath(); ctx.stroke();
        ctx.fillStyle = "#3dbcba"; pontos.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, Math.PI*2); ctx.fill(); });
    }

    function configurarTouch(canvas) {
        let pI = null;
        const getP = e => { const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
        canvas.onmousedown = canvas.ontouchstart = e => { const p = getP(e); pontos.forEach((pt, i) => { if(Math.hypot(pt.x-p.x, pt.y-p.y) < 40) pI = i; }); };
        window.onmousemove = window.ontouchmove = e => { if(pI !== null) { pontos[pI] = getP(e); desenharUI(); } };
        window.onmouseup = window.ontouchend = () => pI = null;
    }

    function processarScan() {
        const src = cv.imread(imgTemp);
        let ptsR = []; pontos.forEach(p => { ptsR.push(p.x/escalaVisual); ptsR.push(p.y/escalaVisual); });
        let srcT = cv.matFromArray(4, 1, cv.CV_32FC2, ptsR);
        const oW = 1000, oH = 1400;
        let dstT = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0, oW,0, oW,oH, 0,oH]);
        let M = cv.getPerspectiveTransform(srcT, dstT), dst = new cv.Mat();
        cv.warpPerspective(src, dst, M, new cv.Size(oW, oH));
        dst.convertTo(dst, -1, 1.4, 10); // Realce Profissional
        const cOut = document.createElement('canvas'); cv.imshow(cOut, dst);
        anexos.push(cOut.toDataURL('image/jpeg', 0.8));
        renderAnexos();
        src.delete(); dst.delete(); M.delete(); document.getElementById('scanner-overlay').style.display='none';
    }

    function renderAnexos() {
        document.getElementById('preview-container').innerHTML = anexos.map((img, i) => `<img src="${img}" class="thumb" onclick="if(confirm('Remover?')){anexos.splice(${i},1);renderAnexos();}">`).join('');
    }

    function fecharScanner() { document.getElementById('scanner-overlay').style.display='none'; }

    // GESTÃO DA FILA E ARQUIVO
    function prepararEnvio() {
        const nome = document.getElementById('nome').value;
        if(!nome) return alert("Nome obrigatório");
        
        const getV = id => document.getElementById(id).value;
        const getR = (name, det) => document.querySelector(`input[name="${name}"]:checked`).value === "Sim" ? `Sim (${getV(det)})` : "Não";

        const registro = {
            idLocal: Date.now(),
            nome: nome,
            dataNasc: getV('dataNasc'),
            idPaciente: getV('idPaciente'),
            exame: getV('exame'),
            hipotese: getV('hipotese'),
            cirurgia: document.querySelector('input[name="cirurgia"]:checked').value,
            cir_det: getV('cir_det'),
            quimio: document.querySelector('input[name="quimio"]:checked').value,
            q_det: getV('q_det'),
            trauma: document.querySelector('input[name="trauma"]:checked').value,
            t_det: getV('t_det'),
            sintomas: getV('sintomas'),
            inicio: getV('inicio'),
            anexos: anexos,
            status: 'pendente'
        };

        let fila = JSON.parse(localStorage.getItem('aliva_fila') || "[]");
        fila.push(registro);
        localStorage.setItem('aliva_fila', JSON.stringify(fila));
        
        alert("Registo guardado localmente e adicionado à fila de envio.");
        location.reload();
    }

    async function carregarLista() {
        const l = document.getElementById('lista-arquivos');
        const fila = JSON.parse(localStorage.getItem('aliva_fila') || "[]");
        
        let html = fila.map(f => `
            <div class="arquivo-item" style="border-left: 5px solid #ffc107;">
                <div><b>${f.nome}</b> <span class="badge-pending">A ENVIAR...</span></div>
                <button onclick="editarLocal(${f.idLocal})" style="border:none;background:none;font-size:1.2rem;">✏️</button>
            </div>`).join('');

        try {
            const res = await fetch(SCRIPT_URL);
            dbOnline = await res.json();
            html += dbOnline.map((f, i) => `
                <div class="arquivo-item">
                    <div><b>${f.name}</b><br><small>${new Date(f.date).toLocaleDateString()}</small></div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="prepararEdicao(${i})" style="border:none;background:none;font-size:1.2rem;">✏️</button>
                        <button onclick="apagarDefinitivo('${f.id}')" style="border:none;background:none;font-size:1.2rem;">🗑️</button>
                        <a href="${f.url}" target="_blank" style="text-decoration:none;font-size:1.2rem;">👁️</a>
                    </div>
                </div>`).join('');
        } catch(e) { html += "<p style='text-align:center; color:red;'>Offline: A mostrar apenas pendentes.</p>"; }
        
        l.innerHTML = html || "Sem registos.";
    }

    function editarLocal(id) {
        let fila = JSON.parse(localStorage.getItem('aliva_fila') || "[]");
        const f = fila.find(x => x.idLocal === id);
        preencherCampos(f);
        fila = fila.filter(x => x.idLocal !== id);
        localStorage.setItem('aliva_fila', JSON.stringify(fila));
        switchTab('aba-novo');
    }

    function prepararEdicao(idx) {
        const f = dbOnline[idx];
        document.getElementById('nome').value = f.name.replace('Ficha_', '').split('_')[0].replace(/-/g,' ');
        document.getElementById('edit-indicator').classList.remove('hidden');
        switchTab('aba-novo');
    }

    function preencherCampos(d) {
        document.getElementById('nome').value = d.nome || '';
        document.getElementById('dataNasc').value = d.dataNasc || '';
        document.getElementById('idPaciente').value = d.idPaciente || '';
        document.getElementById('exame').value = d.exame || '';
        document.getElementById('hipotese').value = d.hipotese || '';
        if(d.cirurgia === "Sim") { document.getElementById('cs').checked = true; toggleC('gc', true); document.getElementById('cir_det').value = d.cir_det; }
        if(d.quimio === "Sim") { document.getElementById('qs').checked = true; toggleC('gq', true); document.getElementById('q_det').value = d.q_det; }
        if(d.trauma === "Sim") { document.getElementById('ts').checked = true; toggleC('gt', true); document.getElementById('t_det').value = d.t_det; }
        document.getElementById('sintomas').value = d.sintomas || '';
        document.getElementById('inicio').value = d.inicio || '';
        anexos = d.anexos || []; renderAnexos();
    }

    async function syncFila() {
        let fila = JSON.parse(localStorage.getItem('aliva_fila') || "[]");
        if(fila.length === 0) return;

        const item = fila[0];
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // PDF Oficial Aliva
        try { doc.addImage(document.getElementById('mainLogo'), 'PNG', 85, 10, 40, 0); } catch(e) {}
        doc.setFontSize(14); doc.text("História Clínica — Imagiologia", 105, 35, {align:'center'});
        
        doc.autoTable({
            startY: 45, head: [['Secção', 'Detalhes']],
            body: [
                ['Paciente', item.nome], ['ID', item.idPaciente], ['Nasc.', item.dataNasc], ['Exame', item.exame],
                ['Hipótese', item.hipotese], ['Cirurgia', item.cir_det || item.cirurgia],
                ['Quimio/Radio', item.q_det || item.quimio], ['Trauma', item.t_det || item.trauma],
                ['Sintomas', item.sintomas], ['Início', item.inicio]
            ],
            theme: 'striped', headStyles: { fillColor: [42, 122, 155] }
        });
        item.anexos.forEach(img => { doc.addPage(); doc.addImage(img, 'JPEG', 5, 5, 200, 287); });

        try {
            const base64 = doc.output('datauristring').split(',')[1];
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ nome: `Ficha_${item.nome.replace(/\s/g,'-')}`, pdf: base64 }) });
            fila.shift();
            localStorage.setItem('aliva_fila', JSON.stringify(fila));
            if(document.getElementById('aba-arquivo').classList.contains('active')) carregarLista();
        } catch(e) { console.log("Sync falhou, a aguardar net..."); }
    }

    async function apagarDefinitivo(id) {
        if(!confirm("Eliminar permanentemente?")) return;
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
        carregarLista();
    }
</script>
</body>
</html>
