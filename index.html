<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Aliva Saúde — Gestão Clínica</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#2a7a9b"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
  
  <style>
    :root { --aliva-escuro: #2a7a9b; --aliva-claro: #3dbcba; --fundo: #eaf6f6; --branco: #ffffff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); padding: 10px; color: #333; }
    
    /* Tabs e Cards (Mantendo seu estilo) */
    .nav-tabs { display: flex; gap: 5px; max-width: 800px; margin: 0 auto 15px auto; }
    .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; background: white; color: var(--aliva-escuro); font-weight: bold; cursor: pointer; }
    .tab-btn.active { background: var(--aliva-escuro); color: white; }
    .card { background: white; border-radius: 14px; padding: 20px; max-width: 800px; margin: 0 auto; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
    .aba-conteudo { display: none; }
    .aba-conteudo.active { display: block; }
    header { text-align: center; margin-bottom: 15px; }
    .logo { max-width: 150px; }

    /* Estilo Inputs Condicionais e Rádios */
    .section-title { font-size: 0.85rem; color: var(--aliva-claro); text-transform: uppercase; margin: 15px 0 8px 0; border-bottom: 1px solid #eee; padding-bottom: 3px; font-weight: bold; }
    .input-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; color: var(--aliva-escuro); font-size: 0.95rem; }
    input, textarea { width: 100%; padding: 12px; border: 1.5px solid #d1e8e7; border-radius: 8px; font-size: 1rem; outline: none; }
    .radio-group { display: flex; gap: 10px; margin-top: 5px; }
    .radio-group input[type="radio"] { display: none; }
    .radio-group label { flex: 1; background: #fff; border: 1.5px solid #d1e8e7; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; color: #777; }
    .radio-group input[type="radio"]:checked + label { background: var(--aliva-claro); border-color: var(--aliva-claro); color: white; }
    .conditional-field { display: none; margin-top: 8px; }

    /* Overlay do Scanner Manual */
    #scanner-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: none; flex-direction: column; z-index: 10000;
    }
    #scanner-canvas-container {
      position: relative; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    #canvas-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); touch-action: none; }
    .scanner-btns { display: flex; padding: 20px; gap: 10px; background: #1a1a1a; }
    .btn-scanner { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

    .btn-save { background: var(--aliva-claro); color: white; width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
    #preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .thumb { width: 70px; height: 90px; object-fit: cover; border-radius: 6px; border: 2px solid var(--aliva-claro); }
    .arquivo-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

<header><img src="Hlogo.png" alt="Aliva Saúde" class="logo"></header>

<div class="nav-tabs">
  <button id="btn-novo" class="tab-btn active" onclick="switchTab('aba-novo')">Ficha Clínica</button>
  <button id="btn-arquivo" class="tab-btn" onclick="switchTab('aba-arquivo')">Arquivo</button>
</div>

<div id="aba-novo" class="aba-conteudo active">
  <div class="card">
    <div class="section-title">Dados do Paciente</div>
    <div class="input-group"><label>Nome Completo</label><input type="text" id="nome"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="input-group"><label>Nascimento</label><input type="date" id="dataNasc"></div>
        <div class="input-group"><label>ID / Processo</label><input type="text" id="idPaciente"></div>
    </div>
    <div class="input-group"><label>Exame Solicitado</label><input type="text" id="exame"></div>

    <div class="section-title">História Clínica</div>
    <div class="input-group"><label>Hipótese Diagnóstica</label><textarea id="hipotese" rows="2"></textarea></div>

    <div class="input-group">
      <label>Cirurgia Prévia?</label>
      <div class="radio-group">
        <input type="radio" name="cirurgia" id="cir_no" value="Não" checked onclick="toggleC('group-cir', false)">
        <label for="cir_no">Não</label>
        <input type="radio" name="cirurgia" id="cir_yes" value="Sim" onclick="toggleC('group-cir', true)">
        <label for="cir_yes">Sim</label>
      </div>
      <div id="group-cir" class="conditional-field"><input type="text" id="cirurgiaDetalhe" placeholder="Qual cirurgia?"></div>
    </div>

    <div class="input-group">
      <label>Febre ou Outros Sintomas?</label>
      <div class="radio-group">
        <input type="radio" name="sintomas" id="s_no" value="Não" checked onclick="toggleC('group-s', false)">
        <label for="s_no">Não</label>
        <input type="radio" name="sintomas" id="s_yes" value="Sim" onclick="toggleC('group-s', true)">
        <label for="s_yes">Sim</label>
      </div>
      <div id="group-s" class="conditional-field"><input type="text" id="sintomasDetalhe" placeholder="Quais sintomas?"></div>
    </div>

    <div class="input-group"><label>Início dos Sintomas (Tempo)</label><input type="text" id="inicio"></div>

    <div class="section-title">Anexos (Ajuste Manual)</div>
    <input type="file" id="camInput" accept="image/*" capture="environment">
    <div id="preview-container"></div>

    <button class="btn-save" id="btnEnviar" onclick="gerarEEnviar()">Finalizar e Arquivar</button>
  </div>
</div>

<div id="aba-arquivo" class="aba-conteudo">
  <div class="card"><div id="lista-arquivos">A carregar arquivo...</div></div>
</div>

<div id="scanner-overlay">
  <div style="color:white; text-align:center; padding:10px;">Arraste os pontos para os cantos da folha</div>
  <div id="scanner-canvas-container">
    <canvas id="canvas-ui"></canvas>
  </div>
  <div class="scanner-btns">
    <button class="btn-scanner" style="background:#444; color:white;" onclick="fecharScanner()">Cancelar</button>
    <button class="btn-scanner" style="background:var(--aliva-claro); color:white;" onclick="processarRecorteManual()">Cortar e Aplicar Filtro</button>
  </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyg3ZXQLgUGkGPI4-7TiWtaAb1bMD95j_M3WSuhQQoG5DYvdOFmII5Ztf85Nf_Rqpo/exec';
    let anexos = [];
    let pontos = [];
    let imgOriginal = null;
    let escalaVisual = 1;

    function toggleC(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; }
    function switchTab(id) {
        document.querySelectorAll('.aba-conteudo, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'aba-arquivo') carregarLista();
    }

    // Lógica de Captura
    document.getElementById('camInput').addEventListener('change', function(e) {
        if(!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = () => abrirEditorManual(img);
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function abrirEditorManual(img) {
        imgOriginal = img;
        const overlay = document.getElementById('scanner-overlay');
        const canvas = document.getElementById('canvas-ui');
        const ctx = canvas.getContext('2d');
        overlay.style.display = 'flex';

        // Ajustar canvas ao ecrã
        const maxW = window.innerWidth * 0.95;
        const maxH = window.innerHeight * 0.7;
        escalaVisual = Math.min(maxW / img.width, maxH / img.height);
        canvas.width = img.width * escalaVisual;
        canvas.height = img.height * escalaVisual;

        // Pontos iniciais (um retângulo no centro)
        const w = canvas.width; const h = canvas.height;
        pontos = [
            {x: w*0.1, y: h*0.1}, {x: w*0.9, y: h*0.1},
            {x: w*0.9, y: h*0.9}, {x: w*0.1, y: h*0.9}
        ];

        desenharEditor();
        configurarTouch(canvas);
    }

    function desenharEditor() {
        const canvas = document.getElementById('canvas-ui');
        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgOriginal, 0, 0, canvas.width, canvas.height);
        
        // Linhas
        ctx.strokeStyle = "#3dbcba"; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(pontos[0].x, pontos[0].y);
        pontos.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath(); ctx.stroke();

        // Círculos nos cantos
        ctx.fillStyle = "#3dbcba";
        pontos.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, Math.PI*2); ctx.fill();
        });
    }

    function configurarTouch(canvas) {
        let pontoAtivo = null;
        const handleMove = (e) => {
            if (pontoAtivo === null) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            pontos[pontoAtivo].x = touch.clientX - rect.left;
            pontos[pontoAtivo].y = touch.clientY - rect.top;
            desenharEditor();
        };
        canvas.onmousedown = canvas.ontouchstart = (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const mouseX = touch.clientX - rect.left;
            const mouseY = touch.clientY - rect.top;
            pontos.forEach((p, i) => {
                if (Math.hypot(p.x - mouseX, p.y - mouseY) < 30) pontoAtivo = i;
            });
        };
        window.onmousemove = window.ontouchmove = handleMove;
        window.onmouseup = window.ontouchend = () => pontoAtivo = null;
    }

    function processarRecorteManual() {
        const src = cv.imread(imgOriginal);
        // Converter pontos da escala visual para escala real da imagem
        let ptsData = [];
        pontos.forEach(p => {
            ptsData.push(p.x / escalaVisual);
            ptsData.push(p.y / escalaVisual);
        });

        let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, ptsData);
        const outW = 800; const outH = 1100; // Proporção A4
        let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, outW, 0, outW, outH, 0, outH]);
        
        let M = cv.getPerspectiveTransform(srcTri, dstTri);
        let dst = new cv.Mat();
        cv.warpPerspective(src, dst, M, new cv.Size(outW, outH));

        // FILTRO CÓPIA A CORES (Brilho e Contraste)
        let final = new cv.Mat();
        dst.convertTo(final, -1, 1.3, 20); // 1.3 contraste, 20 brilho

        const canvasOut = document.createElement('canvas');
        cv.imshow(canvasOut, final);
        anexos.push(canvasOut.toDataURL('image/jpeg', 0.8));
        renderAnexos();

        src.delete(); dst.delete(); final.delete(); M.delete(); srcTri.delete(); dstTri.delete();
        fecharScanner();
    }

    function fecharScanner() { document.getElementById('scanner-overlay').style.display = 'none'; }

    function renderAnexos() {
        document.getElementById('preview-container').innerHTML = anexos.map((img, i) => 
            `<img src="${img}" class="thumb" onclick="if(confirm('Remover?')) {anexos.splice(${i},1); renderAnexos();}">`).join('');
    }

    // Geração de PDF e Lista de Arquivos (Mantido do código anterior)
    async function gerarEEnviar() {
        const nome = document.getElementById('nome').value;
        if (!nome) { alert("Nome obrigatório"); return; }
        document.getElementById('btnEnviar').disabled = true;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setTextColor(42, 122, 155);
        doc.setFontSize(22); doc.text("aliva", 105, 20, {align:'center'});
        doc.setFontSize(14); doc.text("História Clínica — Imagiologia", 105, 30, {align:'center'});
        
        const getV = id => document.getElementById(id).value;
        const getR = (name, det) => document.querySelector(`input[name="${name}"]:checked`).value === "Sim" ? `Sim (${getV(det)})` : "Não";

        doc.autoTable({
            startY: 40,
            head: [['Dados', 'Info']],
            body: [
                ['Paciente', getV('nome')], ['Nascimento', getV('dataNasc')],
                ['ID', getV('idPaciente')], ['Exame', getV('exame')],
                ['Hipótese', getV('hipotese')], ['Início', getV('inicio')]
            ],
            theme: 'striped', headStyles: { fillColor: [42, 122, 155] }
        });

        anexos.forEach(img => { doc.addPage(); doc.addImage(img, 'JPEG', 0, 0, 210, 297); });

        try {
            const base64 = doc.output('datauristring').split(',')[1];
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ nome: `Ficha_${nome.replace(/\s/g, '_')}`, pdf: base64 }) });
            alert("Enviado com sucesso!");
            location.reload();
        } catch (e) { alert("Erro"); document.getElementById('btnEnviar').disabled = false; }
    }

    async function carregarLista() {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        document.getElementById('lista-arquivos').innerHTML = data.map(f => `
            <div class="arquivo-item">
                <span>${f.name}</span>
                <div style="display:flex; gap:15px;">
                    <button onclick="editar('${f.name}')" style="background:none; border:none; cursor:pointer;">✏️</button>
                    <a href="${f.url}" target="_blank">👁️</a>
                </div>
            </div>`).join('');
    }
    function editar(n) { document.getElementById('nome').value = n.replace('Ficha_', '').replace(/_/g, ' '); switchTab('aba-novo'); }
</script>
</body>
</html>
