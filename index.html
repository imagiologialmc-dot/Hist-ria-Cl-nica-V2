<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aliva Saúde — Gestão Clínica</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#2a7a9b"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <style>
    :root {
      --aliva-azul-escuro: #2a7a9b;
      --aliva-azul-claro: #3dbcba;
      --aliva-fundo: #eaf6f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--aliva-fundo); padding: 15px; }

    /* Navegação por Abas */
    .nav-tabs {
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto 20px auto;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: white;
      color: var(--aliva-azul-escuro);
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .tab-btn.active {
      background: var(--aliva-azul-escuro);
      color: white;
    }

    .card { 
      background: white; 
      border-radius: 14px; 
      padding: 25px; 
      max-width: 800px; 
      margin: 0 auto; 
      box-shadow: 0 4px 18px rgba(61,188,184,0.15); 
    }

    .aba-conteudo { display: none; }
    .aba-conteudo.active { display: block; }

    h2 { color: var(--aliva-azul-escuro); margin-bottom: 20px; font-size: 1.2rem; }
    
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #555; font-weight: 600; }
    input, textarea { 
      width: 100%; padding: 12px; border: 1px solid #b2e0de; border-radius: 8px; font-size: 1rem;
    }

    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 8px;
      color: white; font-weight: bold; cursor: pointer; margin-top: 10px;
    }
    .btn-primary { background: var(--aliva-azul-claro); }
    .btn-secondary { background: var(--aliva-azul-escuro); }

    /* Estilo da lista de arquivos */
    .arquivo-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px; border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('aba-novo')">Novo Registo</button>
    <button class="tab-btn" onclick="switchTab('aba-arquivo'); carregarArquivos();">Arquivo</button>
  </div>

  <div id="aba-novo" class="aba-conteudo active">
    <div class="card">
      <h2>Nova História Clínica</h2>
      
      <div class="input-group">
        <label>Nome do Paciente</label>
        <input type="text" id="nome" placeholder="Ex: João Silva">
      </div>

      <div class="input-group">
        <label>Capturar Documento (Câmara/Ficheiro)</label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        <img id="previewImg" style="display:none; width: 100%; margin-top:10px; border-radius:8px; border: 2px solid var(--aliva-azul-claro);">
      </div>

      <button class="btn btn-primary" onclick="salvarDocumento()">Gerar e Enviar PDF</button>
    </div>
  </div>

  <div id="aba-arquivo" class="aba-conteudo">
    <div class="card">
      <h2>Documentos no Google Drive</h2>
      <div id="lista-arquivos">A carregar documentos...</div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'URL_DO_SEU_GOOGLE_SCRIPT';

    function switchTab(id) {
      document.querySelectorAll('.aba-conteudo, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // Pré-visualização da imagem
    document.getElementById('cameraInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = document.getElementById('previewImg');
          img.src = event.target.result;
          img.style.display = 'block';
        }
        reader.readAsDataURL(file);
      }
    });

    async function carregarArquivos() {
      const container = document.getElementById('lista-arquivos');
      try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        if (data.length === 0) {
          container.innerHTML = "Nenhum ficheiro encontrado.";
          return;
        }
        container.innerHTML = data.map(f => `
          <div class="arquivo-item">
            <span>${f.name}</span>
            <a href="${f.url}" target="_blank" style="color:var(--aliva-azul-escuro); font-weight:bold;">Abrir</a>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = "Erro ao carregar. Verifique o URL do Script.";
      }
    }

    // Próximo passo: Implementaremos a função salvarDocumento() 
    // que gera o PDF com a imagem e envia para o Drive.
  </script>
</body>
</html>
