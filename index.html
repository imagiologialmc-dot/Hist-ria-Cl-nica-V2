<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aliva Saúde — Gestão Clínica</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#2a7a9b"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root { --aliva-escuro: #2a7a9b; --aliva-claro: #3dbcba; --fundo: #eaf6f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); padding: 10px; }
    .nav-tabs { display: flex; gap: 5px; max-width: 900px; margin: 0 auto 15px auto; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: white; color: var(--aliva-escuro); font-weight: bold; }
    .tab-btn.active { background: var(--aliva-escuro); color: white; }
    .card { background: white; border-radius: 16px; padding: 20px; max-width: 900px; margin: 0 auto; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
    .aba-conteudo { display: none; }
    .aba-conteudo.active { display: block; }
    .input-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; color: var(--aliva-escuro); font-size: 0.9rem; }
    input, textarea { width: 100%; padding: 10px; border: 1.5px solid #d1e8e7; border-radius: 8px; font-size: 1rem; }
    .btn-save { background: var(--aliva-claro); color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    #preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .thumb { width: 80px; height: 100px; object-fit: cover; border-radius: 5px; border: 2px solid var(--aliva-claro); }
    .arquivo-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

<div class="nav-tabs">
  <button id="btn-novo" class="tab-btn active" onclick="switchTab('aba-novo')">Ficha Clínica</button>
  <button id="btn-arquivo" class="tab-btn" onclick="switchTab('aba-arquivo')">Arquivo (4 dias)</button>
</div>

<div id="aba-novo" class="aba-conteudo active">
  <div class="card">
    <h3 id="titulo-modo" style="color:var(--aliva-escuro); margin-bottom:15px;">Nova Entrada</h3>
    <div class="input-group"><label>Nome Completo</label><input type="text" id="nome"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="input-group"><label>Nascimento</label><input type="date" id="dataNasc"></div>
        <div class="input-group"><label>ID Paciente</label><input type="text" id="idPaciente"></div>
    </div>
    <div class="input-group"><label>Exame Solicitado</label><input type="text" id="exame"></div>
    <div class="input-group"><label>Hipótese Diagnóstica</label><textarea id="hipotese" rows="2"></textarea></div>
    <div class="input-group"><label>Cirurgias / Histórico</label><textarea id="historico" rows="2"></textarea></div>
    
    <label>Documentos/Anexos</label>
    <input type="file" id="camInput" accept="image/*" capture="environment">
    <div id="preview-container"></div>

    <button class="btn-save" id="btnEnviar" onclick="gerarEEnviar()">Finalizar e Sincronizar</button>
  </div>
</div>

<div id="aba-arquivo" class="aba-conteudo">
  <div class="card">
    <div id="lista-arquivos">Carregando arquivo...</div>
  </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyg3ZXQLgUGkGPI4-7TiWtaAb1bMD95j_M3WSuhQQoG5DYvdOFmII5Ztf85Nf_Rqpo/exec';
    let anexos = [];

    function switchTab(id) {
        document.querySelectorAll('.aba-conteudo, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'aba-arquivo') carregarLista();
    }

    document.getElementById('camInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            anexos.push(event.target.result);
            renderizarAnexos();
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function renderizarAnexos() {
        const cont = document.getElementById('preview-container');
        cont.innerHTML = anexos.map(img => `<img src="${img}" class="thumb">`).join('');
    }

    async function gerarEEnviar() {
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "Sincronizando...";

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const nome = document.getElementById('nome').value;

        // Estética do PDF alinhada ao modelo Sarah
        doc.setTextColor(42, 122, 155);
        doc.setFontSize(22); doc.text("aliva", 105, 20, {align:'center'});
        doc.setFontSize(14); doc.text("História Clínica - Imagiologia", 105, 30, {align:'center'});
        
        doc.autoTable({
            startY: 40,
            head: [['Campo', 'Informação']],
            body: [
                ['Nome', nome],
                ['Nascimento', document.getElementById('dataNasc').value],
                ['ID', document.getElementById('idPaciente').value],
                ['Exame', document.getElementById('exame').value],
                ['Hipótese', document.getElementById('hipotese').value],
                ['Histórico', document.getElementById('historico').value]
            ],
            theme: 'striped',
            headStyles: { fillColor: [42, 122, 155] }
        });

        // Adiciona fotos como páginas extras (Estilo CamScanner)
        anexos.forEach((img, i) => {
            doc.addPage();
            doc.addImage(img, 'JPEG', 10, 10, 190, 0);
        });

        const base64 = doc.output('datauristring').split(',')[1];
        
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                nome: `Historia_${nome.replace(/\s/g, '_')}`,
                pdf: base64
            })
        });

        alert("Sincronizado com o Arquivo!");
        location.reload();
    }

    async function carregarLista() {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        document.getElementById('lista-arquivos').innerHTML = data.map(f => `
            <div class="arquivo-item">
                <span>${f.name}</span>
                <div>
                    <button onclick="editarFicha('${f.name}')" style="margin-right:10px; cursor:pointer">✏️</button>
                    <a href="${f.url}" target="_blank">👁️</a>
                </div>
            </div>
        `).join('');
    }

    function editarFicha(nomeFicheiro) {
        // Remove "Historia_" do nome para preencher o campo
        document.getElementById('nome').value = nomeFicheiro.replace('Historia_', '').replace(/_/g, ' ');
        document.getElementById('titulo-modo').innerText = "Editando Processo...";
        switchTab('aba-novo');
    }
</script>
</body>
</html>
