<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aliva Saúde — Sistema de Gestão</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#2a7a9b"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>

  <style>
    :root { --aliva-escuro: #2a7a9b; --aliva-claro: #3dbcba; --fundo: #eaf6f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); padding: 15px; }
    
    .nav-tabs { display: flex; gap: 8px; max-width: 900px; margin: 0 auto 20px auto; }
    .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: white; color: var(--aliva-escuro); font-weight: bold; cursor: pointer; }
    .tab-btn.active { background: var(--aliva-escuro); color: white; }

    .card { background: white; border-radius: 16px; padding: 25px; max-width: 900px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .aba-conteudo { display: none; }
    .aba-conteudo.active { display: block; }

    .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full-width { grid-column: span 2; }

    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--aliva-escuro); }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }

    /* Estilo Scanner */
    #scanner-container { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
        align-items: center; justify-content: center; z-index: 9999; 
    }
    canvas { max-width: 90%; max-height: 70%; border: 2px solid white; }
    .scanner-controls { margin-top: 20px; display: flex; gap: 10px; }

    .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-save { background: var(--aliva-claro); color: white; width: 100%; margin-top: 20px; }
    .btn-cancel { background: #ff4444; color: white; }
  </style>
</head>
<body>

<div class="nav-tabs">
  <button id="btn-novo" class="tab-btn active" onclick="switchTab('aba-novo')">Nova Ficha</button>
  <button id="btn-arquivo" class="tab-btn" onclick="switchTab('aba-arquivo')">Arquivo</button>
</div>

<div id="aba-novo" class="aba-conteudo active">
  <div class="card">
    <div class="grid-form">
        <div class="input-group"><label>Nome</label><input type="text" id="nome"></div>
        <div class="input-group"><label>Data de Nascimento</label><input type="date" id="dataNasc"></div>
        <div class="input-group"><label>ID do Paciente</label><input type="text" id="idPaciente"></div>
        <div class="input-group"><label>Exame Solicitado</label><input type="text" id="exame"></div>
        <div class="input-group full-width"><label>Hipótese Diagnóstica</label><textarea id="hipotese"></textarea></div>
        <div class="input-group"><label>Cirurgia Prévia</label><input type="text" id="cirurgia" placeholder="Não / Sim (Qual?)"></div>
        <div class="input-group"><label>Quimio/Radioterapia</label><input type="text" id="quimio" placeholder="Não / Sim"></div>
        <div class="input-group"><label>Trauma</label><input type="text" id="trauma" placeholder="Não / Sim"></div>
        <div class="input-group"><label>Febre / Sintomas</label><input type="text" id="sintomas"></div>
        <div class="input-group full-width"><label>Início dos Sintomas</label><input type="text" id="inicio"></div>
    </div>

    <div class="section-title" style="margin-top:20px; font-weight:bold; color:var(--aliva-escuro)">ANEXOS</div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="margin-top:10px">
    
    <div id="attachments-preview" style="display:flex; gap:10px; margin-top:15px; flex-wrap:wrap;"></div>

    <button class="btn btn-save" onclick="gerarPDF()">Gerar PDF e Enviar</button>
  </div>
</div>

<div id="scanner-container">
    <h3 style="color:white; margin-bottom:10px;">Ajustar Documento</h3>
    <canvas id="canvasOutput"></canvas>
    <div class="scanner-controls">
        <button class="btn btn-cancel" onclick="fecharScanner()">Cancelar</button>
        <button class="btn" style="background:var(--aliva-claro); color:white;" onclick="confirmarRecorte()">Confirmar Recorte</button>
    </div>
</div>

<div id="aba-arquivo" class="aba-conteudo">
  <div class="card" id="lista-arquivos">A carregar...</div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyg3ZXQLgUGkGPI4-7TiWtaAb1bMD95j_M3WSuhQQoG5DYvdOFmII5Ztf85Nf_Rqpo/exec';
    let imagensAnexadas = [];

    function switchTab(id) {
        document.querySelectorAll('.aba-conteudo, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'aba-arquivo') carregarLista();
    }

    // Lógica de Captura e "Scanner"
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    abrirScanner(img);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    });

    function abrirScanner(img) {
        const container = document.getElementById('scanner-container');
        const canvas = document.getElementById('canvasOutput');
        const ctx = canvas.getContext('2d');
        
        container.style.display = 'flex';
        
        // Redimensionar para caber no ecrã mantendo proporção
        const ratio = Math.min(window.innerWidth * 0.9 / img.width, window.innerHeight * 0.7 / img.height);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // Aqui, num sistema real, usaríamos OpenCV para detetar cantos. 
        // Para simplificar esta versão, vamos apenas simular o processamento de imagem.
    }

    function fecharScanner() {
        document.getElementById('scanner-container').style.display = 'none';
    }

    function confirmarRecorte() {
        const canvas = document.getElementById('canvasOutput');
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        imagensAnexadas.push(dataUrl);
        
        const previewDiv = document.getElementById('attachments-preview');
        const miniImg = document.createElement('img');
        miniImg.src = dataUrl;
        miniImg.style.width = '80px';
        miniImg.style.height = '100px';
        miniImg.style.objectFit = 'cover';
        previewDiv.appendChild(miniImg);
        
        fecharScanner();
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const val = id => document.getElementById(id).value;

        // Cabeçalho (Tentando imitar o seu PDF)
        doc.setFontSize(22);
        doc.setTextColor(42, 122, 155);
        doc.text("aliva", 105, 20, {align: 'center'});
        
        doc.setFontSize(16);
        doc.text("História Clínica", 105, 30, {align: 'center'});
        doc.setFontSize(10);
        doc.text("Imagiologia", 105, 35, {align: 'center'});
        doc.text("Data: " + new Date().toLocaleDateString(), 105, 40, {align: 'center'});

        // Tabela de Dados (Igual ao PDF da Sarah)
        doc.autoTable({
            startY: 50,
            head: [['Dados do Paciente', '']],
            body: [
                ['Nome:', val('nome')],
                ['Data de Nascimento:', val('dataNasc')],
                ['ID do Paciente:', val('idPaciente')],
                ['Exame Solicitado:', val('exame')]
            ],
            theme: 'striped',
            headStyles: { fillColor: [42, 122, 155] }
        });

        doc.autoTable({
            startY: doc.lastAutoTable.finalY + 10,
            head: [['História Clínica', '']],
            body: [
                ['Hipótese Diagnóstica:', val('hipotese')],
                ['Cirurgia Prévia:', val('cirurgia')],
                ['Quimio/Radioterapia:', val('quimio')],
                ['Trauma:', val('trauma')],
                ['Febre / Sintomas:', val('sintomas')],
                ['Início dos Sintomas:', val('inicio')]
            ],
            theme: 'striped',
            headStyles: { fillColor: [42, 122, 155] }
        });

        // Adicionar Anexos (Fotos) em novas páginas
        imagensAnexadas.forEach((img, i) => {
            doc.addPage();
            doc.text("Anexo " + (i + 1), 10, 10);
            doc.addImage(img, 'JPEG', 10, 20, 190, 0); // O 0 mantém a proporção automática
        });

        const pdfBase64 = doc.output('datauristring').split(',')[1];
        
        // Enviar para o Drive
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    nome: `Historia_Clinica_${val('nome').replace(/\s/g, '_')}`,
                    pdf: pdfBase64
                })
            });
            alert("Enviado com sucesso!");
            location.reload();
        } catch(e) {
            alert("Erro ao enviar!");
        }
    }

    async function carregarLista() {
        const container = document.getElementById('lista-arquivos');
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        container.innerHTML = data.map(f => `<div>${f.name} - <a href="${f.url}">Abrir</a></div>`).join('');
    }
</script>
</body>
</html>
